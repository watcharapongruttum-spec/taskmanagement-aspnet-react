services:
  postgres:
    image: postgres:16
    container_name: taskmanagement-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskmanagement
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanagement-api
    ports:
      - "5280:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=taskmanagement;Username=postgres;Password=postgres
      - Jwt__Key=THIS_IS_A_SUPER_SECRET_KEY_CHANGE_IN_PRODUCTION_32CHARS
      - Jwt__Issuer=TaskManagementAPI
      - Jwt__Audience=TaskManagementClient
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../task-management-ui
      dockerfile: Dockerfile
    container_name: taskmanagement-ui
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: